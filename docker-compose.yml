services:

  # ── Zookeeper (Kafka dependency) ──────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka Broker ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Kafka UI (visual topic browser) ──────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  # ── ESPN Ingestion Producer ──────────────────────────────
  producer:
    build: .
    container_name: commentary-producer
    command: python -m ingestion.producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SPORT: ${SPORT:-cricket}
      CRICKET_LEAGUE: ${CRICKET_LEAGUE:-ipl}
      CRICKET_LEAGUES: ${CRICKET_LEAGUES:-}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-10}
      CRICKET_POLL_INTERVAL: ${CRICKET_POLL_INTERVAL:-30}
    restart: unless-stopped

  # ── Stream Enricher (Layer 3) ────────────────────────────
  enricher:
    build: .
    container_name: commentary-enricher
    command: python -m streaming.enricher
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SPORT: ${SPORT:-cricket}
    restart: unless-stopped

  # ── LLM Commentator ─────────────────────────────────────
  commentator:
    build: .
    container_name: commentary-llm
    command: python -m llm.commentator
    depends_on:
      kafka:
        condition: service_healthy
      enricher:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      COMMENTATOR_TOPIC: enriched-events
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPORT: ${SPORT:-cricket}
      COMMENTARY_STYLE: ${COMMENTARY_STYLE:-default}
      TTS_ENGINE: "off"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── FastAPI Server ───────────────────────────────────────
  api:
    build: .
    container_name: commentary-api
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      SPORT: ${SPORT:-cricket}
      CORS_ORIGINS: "http://localhost:8501,http://localhost:3000,http://localhost:8080"
    restart: unless-stopped

  # ── Streamlit Dashboard ──────────────────────────────────
  dashboard:
    build: .
    container_name: commentary-dashboard
    command: streamlit run dashboard/app.py --server.headless true --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://api:8000
      WS_URL: ws://api:8000/ws/commentary
      SPORT: ${SPORT:-cricket}
    restart: unless-stopped
